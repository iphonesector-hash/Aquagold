<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Gold</title>

<meta name="theme-color" content="#1AA89A">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
body{font-family:Vazirmatn,system-ui,sans-serif;margin:0}
[x-cloak]{display:none!important}
</style>
</head>

<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()" x-cloak>

<!-- LOGIN -->
<template x-if="!token">
  <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-teal-500 to-teal-700">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">

      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-teal-500 rounded-2xl flex items-center justify-center mb-3 mx-auto">
          <span class="text-3xl">💎</span>
        </div>
        <h1 class="text-2xl font-bold">Aqua Gold</h1>
        <p class="text-sm text-gray-500">سیستم مدیریت خدمات</p>
      </div>

      <form @submit.prevent="login()" class="space-y-4">
        <input x-model="form.username" class="w-full border rounded-xl px-4 py-3" placeholder="نام کاربری">
        <input x-model="form.password" type="password" class="w-full border rounded-xl px-4 py-3" placeholder="رمز عبور">

        <div x-show="error" class="text-red-500 text-sm" x-text="error"></div>

        <button class="w-full bg-teal-500 text-white py-3 rounded-xl" :disabled="loading">
          <span x-show="!loading">ورود</span>
          <span x-show="loading">...</span>
        </button>
      </form>

    </div>
  </div>
</template>

<!-- APP -->
<template x-if="token">
<div>

<header class="bg-white border-b px-6 py-4 flex justify-between">
  <div class="font-bold">Aqua Gold</div>

  <div class="flex gap-3 items-center">
    <span x-text="safeUserName()"></span>
    <button @click="logout()" class="text-red-500">خروج</button>
  </div>
</header>

<main class="p-6">

  <!-- DASHBOARD -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

    <div class="bg-white p-4 rounded-xl">
      <div class="text-xs text-gray-500">درآمد امروز</div>
      <div class="text-xl font-bold" x-text="fmt(stats?.today?.total)"></div>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <div class="text-xs text-gray-500">سرویس امروز</div>
      <div class="text-xl font-bold" x-text="stats?.today?.count ?? 0"></div>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <div class="text-xs text-gray-500">مشتریان</div>
      <div class="text-xl font-bold" x-text="stats?.total_customers ?? 0"></div>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <div class="text-xs text-gray-500">انبار</div>
      <div class="text-xl font-bold" x-text="safeStock()"></div>
    </div>

  </div>

  <!-- RECENT -->
  <div class="bg-white mt-6 p-4 rounded-xl">
    <h2 class="font-bold mb-3">آخرین سرویس‌ها</h2>

    <template x-if="recentJobs.length">
      <template x-for="j in recentJobs" :key="j.id">
        <div class="flex justify-between border-b py-2">
          <div>
            <div x-text="j.name"></div>
            <div class="text-xs text-gray-400" x-text="j.date"></div>
          </div>
          <div x-text="fmt(j.amount)"></div>
        </div>
      </template>
    </template>

    <template x-if="!recentJobs.length">
      <div class="text-center text-gray-400 py-4">سرویسی ثبت نشده</div>
    </template>

  </div>

</main>

</div>
</template>

<script>
function app(){
return {
  token: localStorage.getItem('token'),
  user: JSON.parse(localStorage.getItem('user')||'null'),

  stats: {
    today:{total:0,count:0},
    total_customers:0,
    low_stock:0,
    out_of_stock:0
  },

  recentJobs: [],
  jobs: [],
  customers: [],
  inventory: [],

  form:{username:'',password:''},
  error:'',
  loading:false,

  page:'dashboard',

  // 🧠 SAFE HELPERS (NEW)
  safeUserName(){
    return (this.user?.first_name || '') + ' ' + (this.user?.last_name || '');
  },

  safeStock(){
    return (this.stats?.low_stock || 0) + (this.stats?.out_of_stock || 0);
  },

  async api(path,opts={}){
    try{
      const headers={'Content-Type':'application/json'};

      if(this.token){
        headers.Authorization='Bearer '+this.token;
      }

      const res=await fetch('/api'+path,{...opts,headers});

      const data=await res.json().catch(()=>({}));

      if(res.status===401){
        this.logout();
        return;
      }

      if(!res.ok){
        throw new Error(data.msg || data.error || 'error');
      }

      return data;

    }catch(e){
      console.error('API ERROR:',e);
      return null;
    }
  },

  init(){
    if(this.token) this.loadDashboard();
  },

  async login(){
    this.loading=true;
    this.error='';

    const data=await this.api('/login',{
      method:'POST',
      body:JSON.stringify(this.form)
    });

    if(data){
      this.token=data.token;
      this.user=data.user;

      localStorage.setItem('token',data.token);
      localStorage.setItem('user',JSON.stringify(data.user));

      await this.loadDashboard();
    }

    this.loading=false;
  },

  logout(){
    localStorage.clear();
    location.reload();
  },

  async loadDashboard(){
    const stats = await this.api('/stats');
    const jobs = await this.api('/jobs');

    this.stats = stats || this.stats;
    this.recentJobs = (jobs || []).slice(0,8);
  },

  fmt(n){
    return new Intl.NumberFormat('fa-IR').format(n||0);
  }
}
}
</script>

</body>
</html>
