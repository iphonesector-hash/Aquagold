version: '3.9'

services:
  backend:
    build: .
    container_name: aquagold-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./logs:/app/logs
    networks:
      - aquagold-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: aquagold-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/var/www/html/index.html:ro
      - ./sw.js:/var/www/html/sw.js:ro
      - ./manifest.json:/var/www/html/manifest.json:ro
      - ./icon.svg:/var/www/html/icon.svg:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aquagold-net

networks:
  aquagold-net:
    driver: bridge
