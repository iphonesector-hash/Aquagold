services:
  backend:
    build: .
    container_name: aquagold-backend
    restart: always
    environment:
      - SECRET_KEY=aquagold-secret-key-change-in-production
      - DB_PATH=/app/data/app.db
    volumes:
      - db_data:/app/data
      - upload_data:/app/uploads
    networks:
      - aquagold-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: aquagold-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aquagold-net

volumes:
  db_data:
    driver: local
  upload_data:
    driver: local

networks:
  aquagold-net:
    driver: bridge

